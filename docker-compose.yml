services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exchange
      MYSQL_USER: exchange
      MYSQL_PASSWORD: exchange
    ports:
      - "3306:3306"
    command: ["mysqld", "--mysql-native-password=ON"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uexchange", "-pexchange"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: exchange
      MONGO_INITDB_ROOT_PASSWORD: exchange
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: exchange
      RABBITMQ_DEFAULT_PASS: exchange
    ports:
      - "5672:5672"
      - "15672:15672"
