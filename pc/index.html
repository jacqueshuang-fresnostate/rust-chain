<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIPPO Exchange</title>
</head>

<body class="bg-gray-900 text-white">
  <div id="global-loader"
    style="position: fixed; inset: 0; background-color: #0a0a0a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;">
    <div style="position: relative; width: 120px; height: 120px;">
      <!-- Outer ring -->
      <div
        style="position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; border-top-color: #3b82f6; border-bottom-color: #3b82f6; animation: spin 2s linear infinite; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);">
      </div>
      <!-- Inner ring -->
      <div
        style="position: absolute; inset: 15px; border-radius: 50%; border: 2px solid transparent; border-left-color: #0ea5e9; border-right-color: #0ea5e9; animation: spin-reverse 1.5s linear infinite; box-shadow: 0 0 15px rgba(14, 165, 233, 0.5);">
      </div>
      <!-- Core -->
      <div
        style="position: absolute; inset: 40px; background: #0ea5e9; border-radius: 50%; box-shadow: 0 0 25px #0ea5e9, 0 0 50px #0ea5e9; animation: pulse-core 2s ease-in-out infinite;">
      </div>
    </div>
    <div
      style="margin-top: 35px; font-family: monospace; font-size: 1.25rem; font-weight: bold; color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.8); letter-spacing: 0.2em; animation: pulse-text 1.5s ease-in-out infinite;">
      SYSTEM INITIALIZING...
    </div>
    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-reverse {
        0% {
          transform: rotate(360deg);
        }

        100% {
          transform: rotate(0deg);
        }
      }

      @keyframes pulse-core {

        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.6;
        }

        50% {
          transform: scale(1.1);
          opacity: 1;
        }
      }

      @keyframes pulse-text {

        0%,
        100% {
          opacity: 0.7;
        }

        50% {
          opacity: 1;
          text-shadow: 0 0 20px rgba(59, 130, 246, 1);
        }
      }

      .loader-hidden {
        opacity: 0 !important;
        visibility: hidden !important;
        transform: scale(1.1);
      }
    </style>
  </div>
  <div id="app"></div>
  <script>
    window.global = window;
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
